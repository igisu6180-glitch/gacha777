<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>야짤 가챠</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }

        /* 메인 게임 화면 */
        #gameScreen { display: block; }

        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 유저 정보 바 */
        .user-bar {
            max-width: 500px;
            margin: 0 auto 15px auto;
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .user-bar span { font-weight: bold; font-size: 15px; flex: 1; text-align: left; }
        .user-bar-buttons { display: flex; gap: 8px; }
        .btn-backup {
            padding: 6px 14px;
            font-size: 13px;
            background: #eee;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-backup:hover { background: #ddd; }

        /* 이미지 등록 구역 */
        .upload-box { border: 2px dashed #007bff; padding: 20px; background: #f0f7ff; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .count-text { font-size: 14px; color: #555; margin-top: 5px; }

        /* 버튼 스타일 */
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-draw { background: #ff4757; color: white; margin-top: 10px; }
        .btn-draw:hover { background: #ff6b81; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; }

        /* 결과 화면 상자 */
        .result-box { width: 100%; height: 600px; border: 2px solid #ddd; margin-top: 25px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; position: relative; overflow: hidden; }

        /* 등급 텍스트 뱃지 */
        .grade-badge { position: absolute; top: 15px; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; color: white; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 레어도 스타일 */
        .rarity-common   { border: 6px solid #bdc3c7 !important; }
        .bg-common       { background: #bdc3c7; }
        .rarity-uncommon { border: 6px solid #2ecc71 !important; }
        .bg-uncommon     { background: #2ecc71; }
        .rarity-rare     { border: 6px solid #5bc0de !important; box-shadow: inset 0 0 15px rgba(91,192,222,0.5); }
        .bg-rare         { background: #5bc0de; }
        .rarity-epic     { border: 6px solid #9b59b6 !important; box-shadow: inset 0 0 20px rgba(155,89,182,0.6); }
        .bg-epic         { background: #9b59b6; }
        .rarity-legend   { border: 6px solid #f1c40f !important; box-shadow: inset 0 0 25px rgba(241,196,15,0.8); animation: pulse-gold 1.5s infinite alternate; }
        .bg-legend       { background: #f1c40f; color: #333 !important; }
        .rarity-mythic   { border: 6px solid #e74c3c !important; box-shadow: inset 0 0 30px rgba(231,76,60,0.9); animation: pulse-red 1.2s infinite alternate; }
        .bg-mythic       { background: #e74c3c; animation: shake 0.5s infinite; }
        .rarity-secret   { border: 6px solid #8e44ad !important; box-shadow: inset 0 0 30px rgba(142,68,173,0.9); animation: pulse-secret 1s infinite alternate; }
        .bg-secret       { background: linear-gradient(135deg, #8e44ad, #2c3e50); }

        .result-box img { width: 100%; height: 100%; object-fit: cover; box-sizing: border-box; animation: pop 0.3s ease-out; }

        /* 도감 */
        .illustrated-guide { max-width: 500px; margin: 30px auto 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        .guide-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
        .guide-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-reset, .btn-export, .btn-import { padding: 6px 14px; font-size: 13px; font-weight: bold; background: #ff4757; color: white; border: none; border-radius: 6px; cursor: pointer; width: auto; }
        .btn-reset:hover, .btn-export:hover, .btn-import:hover { background: #ff6b81; }
        .btn-import { background: #007bff; }
        .btn-import:hover { background: #0056b3; }
        .progress-container { background: #eee; border-radius: 10px; height: 12px; width: 100%; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ff4757, #ff6b81); height: 100%; width: 0%; transition: width 0.3s ease; }
        .guide-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; min-height: 80px; }
        .guide-item { width: 100%; aspect-ratio: 1/1; border: 1px dashed #ccc; border-radius: 6px; overflow: hidden; background: #fafafa; display: flex; align-items: center; justify-content: center; }
        .guide-item img { width: 100%; height: 100%; object-fit: cover; }
        .empty-text { grid-column: span 4; text-align: center; color: #aaa; line-height: 80px; margin: 0; font-size: 14px; }

        /* 저장 상태 표시 */
        .save-status {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
            min-height: 18px;
        }
        .save-status.saving { color: #f39c12; }
        .save-status.saved  { color: #2ecc71; }
        .save-status.error  { color: #e74c3c; }

        /* 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-content h3 { margin-top: 0; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #2ecc71; color: white; }
        .btn-confirm:hover { background: #27ae60; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-cancel:hover { background: #ddd; }

        /* 애니메이션 */
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse-gold {
            0%   { box-shadow: inset 0 0 10px rgba(241,196,15,0.4), 0 0 10px rgba(241,196,15,0.2); }
            100% { box-shadow: inset 0 0 25px rgba(241,196,15,0.9), 0 0 20px rgba(241,196,15,0.6); }
        }
        @keyframes pulse-red {
            0%   { box-shadow: inset 0 0 15px rgba(231,76,60,0.5), 0 0 15px rgba(231,76,60,0.3); }
            100% { box-shadow: inset 0 0 35px rgba(231,76,60,1),   0 0 30px rgba(231,76,60,0.8); }
        }
        @keyframes pulse-secret {
            0%   { box-shadow: inset 0 0 15px rgba(142,68,173,0.5), 0 0 15px rgba(142,68,173,0.3); }
            100% { box-shadow: inset 0 0 40px rgba(142,68,173,1),   0 0 35px rgba(142,68,173,0.9); }
        }
        @keyframes shake {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(-1px,1px); }
            50%  { transform: translate(1px,-1px); }
            75%  { transform: translate(-1px,-1px); }
            100% { transform: translate(1px,1px); }
        }
    </style>
</head>
<body>

<!-- ===== 메인 게임 화면 ===== -->
<div id="gameScreen">

    <!-- 유저 정보 바 -->
    <div class="user-bar">
        <span>🎰 야짤 가챠</span>
        <div class="user-bar-buttons">
            <button class="btn-backup" onclick="exportCollection()" title="도감 백업">💾 내보내기</button>
            <button class="btn-backup" onclick="showImportModal()" title="도감 복원">📥 불러오기</button>
        </div>
    </div>

    <div class="container">
        <h2>🎰 야짤을 얻기위해하는 가챠</h2>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <p style="margin:0; font-weight:bold; color:#007bff;">📁 이곳을 클릭해 사진들을 한꺼번에 넣으세요</p>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="storeImages(event)">
            <p class="count-text" id="countDisplay">현재 등록된 이미지: 계산 중...</p>
        </div>

        <button class="btn-draw" id="drawBtn" onclick="pickMyImage()">🎲 무작위 이미지 뽑기</button>

        <div style="margin-top:15px; background:#fff5f5; border-radius:12px; padding:12px; font-weight:bold; color:#ff4757; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
            🔥 확률 3배 보너스까지 <span id="boostCounter">10회 남음</span>
        </div>

        <div class="result-box" id="resultDisplay">
            <p style="color:#aaa;">버튼을 눌러 이미지를 뽑아보세요!</p>
        </div>
    </div>

    <!-- 도감 -->
    <div class="illustrated-guide">
        <div class="guide-title">
            <span>Collected 도감 목록</span>
            <div class="guide-buttons">
                <button class="btn-export" onclick="exportCollection()" title="도감 백업">💾</button>
                <button class="btn-import" onclick="showImportModal()" title="도감 복원">📥</button>
                <button class="btn-reset" onclick="resetCollection()">🗑️ 초기화</button>
            </div>
        </div>
        <div id="guideCount" style="color:#ff4757; font-size:14px; margin-bottom:8px;">인생 망치는 도감 진행도: 0% (0/0종)</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="guide-grid" id="guideGrid">
            <p class="empty-text">��직 수집된 이미지가 없습니다.</p>
        </div>
        <div class="save-status" id="saveStatus"></div>
    </div>

</div>

<!-- 모달: 백업 불러오기 -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <h3>📥 도감 불러오기</h3>
        <p>JSON 파일을 선택하거나 데이터를 붙여넣으세요</p>
        <input type="file" id="importFile" accept=".json" style="margin-bottom:15px; width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
        <textarea id="importData" placeholder="또는 JSON 데이터를 여기에 붙여넣으세요" style="width:100%; height:100px; padding:8px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn btn-confirm" onclick="importCollection()">불러오기</button>
            <button class="modal-btn btn-cancel" onclick="closeImportModal()">취소</button>
        </div>
    </div>
</div>

    epic:    { name: "🔮 에픽",   class: "rarity-epic",    bgClass: "bg-epic",    weight: 5 },

    common:  { name: "⚙️ 일반",   class: "rarity-common",  bgClass: "bg-common",  weight: 45 }
};

// ========== 이미지 풀 ==========
let myImagePool = [

    { url: "https://pbs.twimg.com/media/HImtL3Pb0AAbTxs.jpg:large", grade: "common"},

    { url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTO4_HAEzJO-5GjbKGg9Gu32ovLEwwvjHSJGQ&s", grade: "common"},
    { url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQ1KsngstYdFpS8xAUYhlkh6k8GUsonrQEtA&s", grade: "uncommon"},

    { url: "https://pbs.twimg.com/media/HIoaTN4bwAApxxq.jpg:large", grade: "uncommon"},
    { url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9xpBboXERvVR4qYE-6gX9FjhSiFGyftjPog&s", grade: "uncommon"},
    { url: "https://pbs.twimg.com/media/HImmoBjbQAA08EJ.jpg:large", grade: "rare"},
    { url: "https://pbs.twimg.com/media/HImj4_wb0AAMnwO.jpg:large", grade: "rare"},
    { url: "https://pbs.twimg.com/media/HImm-3IbQAA3MZ7.jpg:large", grade: "rare"},
    { url: "https://pbs.twimg.com/media/HIg0X-NbwAA80V5.jpg:large", grade: "rare"},

    { url: "https://avatars.mds.yandex.net/i?id=94f92724f5046813d0952eeaf21390ffb13914c1-5225268-images-thumbs&n=13", grade: "epic"},
    { url: "https://pbs.twimg.com/media/HInS-qCbgAA6sLq.jpg:large", grade: "epic"},
    { url: "https://pbs.twimg.com/media/HIQ0bF_aMAAp3f1.jpg:large", grade: "epic"},
    { url: "https://media.bunjang.co.kr/product/395547531_3_1773659179_w360.jpg", grade: "epic"},
    { url: "https://avatars.mds.yandex.net/i?id=35ecee55ae93a7ab08f2c5a6d28ad1340bc90120-4354931-images-thumbs&n=13", grade: "epic"},

    { url: "https://pbs.twimg.com/media/HInf1gWa0AA1TEo.jpg:large", grade: "legend"},
    { url: "https://images.steamusercontent.com/ugc/786376174490322038/FC0C06B06DE3EE4E0F840D9563DEC5D763519184/", grade:"legend"},
    { url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504773006210240563/SPOILER_i.png?ex=6a0d7a92&is=6a0c2912&hm=7027a4b201b17cad1a427e95e421d570f491bbd7abc9e9e5a935c110f0b2c63c&", grade: "legend"},

    { url: "https://pbs.twimg.com/media/HIl8-tEbIAEaZlG.jpg:large", grade: "mythic"},
    { url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504772143832105071/SPOILER_i.png?ex=6a0d79c4&is=6a0c2844&hm=5943ec41ee04fb2f77c56b63d18b8128c034e26f848b86a132003094012768cd&", grade: "mythic"},
    { url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504773725923315845/SPOILER_i.png?ex=6a0d7b3d&is=6a0c29bd&hm=6f66b2c12611802601982b5c9cc59320dbda817f5446dc7b17c4c2f203d714af&", grade: "mythic"},
    { url: "https://cdn.discordapp.com/attachments/1506220395391619145/1506220425527693392/KakaoTalk_20260519_175806047.jpg?ex=6a0d7895&is=6a0c2715&hm=352e73ef6bf8a3db1d9c1925f124cf59d24c805d8f41e8d36&", grade: "mythic"},
];

// ========== 상태 변수 ==========
let collectionPool = [];
let drawCount = 0;
let isDrawing = false;
const STORAGE_KEY = 'gacha777_data';

// ========== 초기화 ==========
window.addEventListener('load', function() {
    loadUserData();
    updateUI();
});

// ========== 로컬 저장소: 불러오기 ==========
function loadUserData() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            const parsed = JSON.parse(data);
            collectionPool = parsed.collection || [];
            drawCount = parsed.drawCount || 0;
        } else {
            collectionPool = [];
            drawCount = 0;
        }
        refreshProgress();
    } catch (e) {
        console.error("불러오기 실패:", e);
        collectionPool = [];
        drawCount = 0;
    }
}

// ========== 로컬 저장소: 저장 ==========
function saveUserData() {
    const statusEl = document.getElementById('saveStatus');
    statusEl.className = 'save-status saving';
    statusEl.innerText = '💾 저장 중...';
    try {
        const data = {
            collection: collectionPool,
            drawCount: drawCount,
            timestamp: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        statusEl.className = 'save-status saved';
        statusEl.innerText = '✅ 저장 완료!';
        setTimeout(() => { statusEl.innerText = ''; }, 2000);
    } catch (e) {
        statusEl.className = 'save-status error';
        statusEl.innerText = '❌ 저장 실패. 저장소 공간을 확인하세요.';
    }
}

// ========== 내보내기 ==========
window.exportCollection = function() {
    const backup = {
        version: "1.0",
        timestamp: new Date().toISOString(),
        collection: collectionPool,
        drawCount: drawCount,
        imagePoolCount: myImagePool.length
    };

    const dataStr = JSON.stringify(backup, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `gacha777_backup_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    alert('✅ 도감 백업이 완료됐습니다!');
};

// ========== 불러오기 모달 ==========
window.showImportModal = function() {
    document.getElementById('importModal').classList.add('show');
};

window.closeImportModal = function() {
    document.getElementById('importModal').classList.remove('show');
    document.getElementById('importFile').value = '';
    document.getElementById('importData').value = '';
};

// ========== 불러오기 실행 ==========
window.importCollection = async function() {
    const fileInput = document.getElementById('importFile');
    const textInput = document.getElementById('importData');
    let data = null;

    try {
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const text = await file.text();
            data = JSON.parse(text);
        } else if (textInput.value.trim()) {
            data = JSON.parse(textInput.value);
        } else {
            alert('❌ 파일을 선택하거나 데이터를 입력해주세요!');
            return;
        }

        // 데이터 검증
        if (!data.collection || !Array.isArray(data.collection)) {
            alert('❌ 잘못된 백업 파일입니다!');
            return;
        }

        // 기존 도감과 병합 (중복 제거)
        const existingUrls = new Set(collectionPool.map(item => item.url));
        const newItems = data.collection.filter(item => !existingUrls.has(item.url));
        
        collectionPool = [...collectionPool, ...newItems];
        drawCount = Math.max(drawCount, data.drawCount || 0);

        refreshProgress();
        updateUI();
        saveUserData();

        alert(`✅ ${newItems.length}개의 새로운 아이템을 추가했습니다!`);
        closeImportModal();
    } catch (e) {
        alert(`❌ 불러오기 실패: ${e.message}`);
    }
};

// 모달 밖 클릭 시 닫기
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('importModal');
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeImportModal();
    });
});

// ========== 도감 초기화 ==========
window.resetCollection = async function() {
    if (!confirm(`도감을 초기화할까요? 이 작업은 되돌릴 수 없어요!`)) return;
    collectionPool = [];
    drawCount = 0;
    saveUserData();
    refreshProgress();
    updateUI();
    document.getElementById('resultDisplay').innerHTML = '<p style="color:#aaa;">버튼을 눌러 이미지를 뽑아보세요!</p>';
    document.getElementById('resultDisplay').className = 'result-box';
};

// ========== UI 업데이트 ==========
function updateUI() {
    const remain = 10 - (drawCount % 10 || 10);
    document.getElementById('countDisplay').innerText =
        `현재 등록된 이미지: ${myImagePool.length}장 | 총 뽑기 횟수: ${drawCount}회`;
    document.getElementById('boostCounter').innerText =
        remain === 0 ? "지금 확률 3배!" : `${remain}회 남음`;
    document.getElementById('drawBtn').disabled = myImagePool.length === 0;
}

// ========== 이미지 업로드 ==========
window.storeImages = function(event) {
    const files = event.target.files;
    if (!files.length) return;
    const keys = Object.keys(GRADE_RULES);
    const totalWeight = keys.reduce((sum, key) => sum + GRADE_RULES[key].weight, 0);
    for (let i = 0; i < files.length; i++) {
        const url = URL.createObjectURL(files[i]);
        let randomNum = Math.random() * totalWeight;
        let selectedGrade = "common";
        for (let key of keys) {
            if (randomNum < GRADE_RULES[key].weight) { selectedGrade = key; break; }
            randomNum -= GRADE_RULES[key].weight;
        }
        myImagePool.push({ url, grade: selectedGrade });
    }
    updateUI();
    event.target.value = "";
};

// ========== 뽑기 ==========
window.pickMyImage = async function() {
    const btn = document.getElementById('drawBtn');
    if (btn.disabled || isDrawing || myImagePool.length === 0) return;
    isDrawing = true;
    btn.disabled = true;

    drawCount++;
    const boosted = (drawCount % 10 === 0);

    const totalWeight = myImagePool.reduce((sum, item) => {
        let w = GRADE_RULES[item.grade].weight;
        if (boosted && ["mythic","legend","epic"].includes(item.grade)) w *= 3;
        return sum + w;
    }, 0);

    let randomNum = Math.random() * totalWeight;
    let targetItem = null;
    for (const item of myImagePool) {
        let w = GRADE_RULES[item.grade].weight;
        if (boosted && ["mythic","legend","epic"].includes(item.grade)) w *= 3;
        if (randomNum < w) { targetItem = item; break; }
        randomNum -= w;
    }
    if (!targetItem) targetItem = myImagePool[0];

    const gradeInfo = GRADE_RULES[targetItem.grade];

    // 도감 중복 방지
    if (!collectionPool.some(item => item.url === targetItem.url)) {
        collectionPool.push({ url: targetItem.url, grade: targetItem.grade });
    }

    // 결과 출력
    const resultDisplay = document.getElementById('resultDisplay');
    resultDisplay.className = "result-box " + gradeInfo.class;
    resultDisplay.innerHTML = `
        <span class="grade-badge ${gradeInfo.bgClass}">${gradeInfo.name}</span>
        <img src="${targetItem.url}" alt="뽑기 결과">
        ${boosted ? `<div style="position:absolute;bottom:10px;background:#ff4757;color:white;padding:8px 16px;border-radius:20px;font-weight:bold;box-shadow:0 0 20px rgba(255,0,0,0.6);">🔥 신화 3배!</div>` : ''}
    `;

    refreshProgress();
    updateUI();
    saveUserData();

    setTimeout(() => { isDrawing = false; btn.disabled = false; }, 1000);
};

// ========== 도감 렌더링 ==========
function refreshProgress() {
    const total = myImagePool.length;
    const collected = collectionPool.length;
    const percentage = total > 0 ? Math.round((collected / total) * 100) : 0;
    document.getElementById('guideCount').innerText = `인생 망치는 도감 진행도: ${percentage}% (${collected}/${total}종)`;
    document.getElementById('progressBar').style.width = percentage + "%";
    const grid = document.getElementById('guideGrid');
    if (collected === 0) {
        grid.innerHTML = `<p class="empty-text">아직 수집된 이미지가 없습니다.</p>`;
        return;
    }
    grid.innerHTML = collectionPool.map(item => `
        <div class="guide-item ${GRADE_RULES[item.grade].class}" style="border-width:2px !important; animation:none;">
            <img src="${item.url}">
        </div>
    `).join('');
}
</script>
