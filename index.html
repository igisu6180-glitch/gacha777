<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>야짤 가챠</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }

        /* 닉네임 로그인 화면 */
        #loginScreen {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        #loginScreen h2 { margin-bottom: 20px; }
        #nicknameInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        #nicknameInput:focus { border-color: #ff4757; outline: none; }
        #passwordInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        #passwordInput:focus { border-color: #ff4757; outline: none; }
        .login-error { color: #e74c3c; font-size: 13px; margin-bottom: 10px; min-height: 18px; }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-login:hover { background: #ff6b81; }

        /* 메인 게임 화면 */
        #gameScreen { display: none; }

        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 유저 정보 바 */
        .user-bar {
            max-width: 500px;
            margin: 0 auto 15px auto;
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-bar span { font-weight: bold; font-size: 15px; }
        .btn-logout {
            padding: 6px 14px;
            font-size: 13px;
            background: #eee;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-logout:hover { background: #ddd; }

        /* 이미지 등록 구역 */
        .upload-box { border: 2px dashed #007bff; padding: 20px; background: #f0f7ff; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .count-text { font-size: 14px; color: #555; margin-top: 5px; }

        /* 버튼 스타일 */
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-draw { background: #ff4757; color: white; margin-top: 10px; }
        .btn-draw:hover { background: #ff6b81; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; }

        /* 결과 화면 상자 */
        .result-box { width: 100%; height: 600px; border: 2px solid #ddd; margin-top: 25px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; overflow: hidden; box-sizing: border-box; position: relative; }

        /* 등급 텍스트 뱃지 */
        .grade-badge { position: absolute; top: 15px; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; color: white; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 레어도 스타일 */
        .rarity-common   { border: 6px solid #bdc3c7 !important; }
        .bg-common       { background: #bdc3c7; }
        .rarity-uncommon { border: 6px solid #2ecc71 !important; }
        .bg-uncommon     { background: #2ecc71; }
        .rarity-rare     { border: 6px solid #5bc0de !important; box-shadow: inset 0 0 15px rgba(91,192,222,0.5); }
        .bg-rare         { background: #5bc0de; }
        .rarity-epic     { border: 6px solid #9b59b6 !important; box-shadow: inset 0 0 20px rgba(155,89,182,0.6); }
        .bg-epic         { background: #9b59b6; }
        .rarity-legend   { border: 6px solid #f1c40f !important; box-shadow: inset 0 0 25px rgba(241,196,15,0.8); animation: pulse-gold 1.5s infinite alternate; }
        .bg-legend       { background: #f1c40f; color: #333 !important; }
        .rarity-mythic   { border: 6px solid #e74c3c !important; box-shadow: inset 0 0 30px rgba(231,76,60,0.9); animation: pulse-red 1.2s infinite alternate; }
        .bg-mythic       { background: #e74c3c; animation: shake 0.5s infinite; }
        .rarity-secret   { border: 6px solid #8e44ad !important; box-shadow: inset 0 0 30px rgba(142,68,173,0.9); animation: pulse-secret 1s infinite alternate; }
        .bg-secret       { background: linear-gradient(135deg, #8e44ad, #2c3e50); }

        .result-box img { width: 100%; height: 100%; object-fit: cover; box-sizing: border-box; animation: pop 0.3s ease-out; }

        /* 도감 */
        .illustrated-guide { max-width: 500px; margin: 30px auto 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        .guide-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-reset { padding: 6px 14px; font-size: 13px; font-weight: bold; background: #ff4757; color: white; border: none; border-radius: 6px; cursor: pointer; width: auto; }
        .btn-reset:hover { background: #ff6b81; }
        .progress-container { background: #eee; border-radius: 10px; height: 12px; width: 100%; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ff4757, #ff6b81); height: 100%; width: 0%; transition: width 0.3s ease; }
        .guide-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; min-height: 80px; }
        .guide-item { width: 100%; aspect-ratio: 1/1; border: 1px dashed #ccc; border-radius: 6px; overflow: hidden; background: #fafafa; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .guide-item img { width: 100%; height: 100%; object-fit: cover; }
        .empty-text { grid-column: span 4; text-align: center; color: #aaa; line-height: 80px; margin: 0; font-size: 14px; }

        /* 저장 상태 표시 */
        .save-status {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
            min-height: 18px;
        }
        .save-status.saving { color: #f39c12; }
        .save-status.saved  { color: #2ecc71; }
        .save-status.error  { color: #e74c3c; }

        /* 애니메이션 */
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse-gold {
            0%   { box-shadow: inset 0 0 10px rgba(241,196,15,0.4), 0 0 10px rgba(241,196,15,0.2); }
            100% { box-shadow: inset 0 0 25px rgba(241,196,15,0.9), 0 0 20px rgba(241,196,15,0.6); }
        }
        @keyframes pulse-red {
            0%   { box-shadow: inset 0 0 15px rgba(231,76,60,0.5), 0 0 15px rgba(231,76,60,0.3); }
            100% { box-shadow: inset 0 0 35px rgba(231,76,60,1),   0 0 30px rgba(231,76,60,0.8); }
        }
        @keyframes pulse-secret {
            0%   { box-shadow: inset 0 0 15px rgba(142,68,173,0.5), 0 0 15px rgba(142,68,173,0.3); }
            100% { box-shadow: inset 0 0 40px rgba(142,68,173,1),   0 0 35px rgba(142,68,173,0.9); }
        }
        @keyframes shake {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(-1px,1px); }
            50%  { transform: translate(1px,-1px); }
            75%  { transform: translate(-1px,-1px); }
            100% { transform: translate(1px,1px); }
        }
    </style>
</head>
<body>

<!-- ===== 닉네임 로그인 화면 ===== -->
<div id="loginScreen">
    <h2>🎰 야짤 가챠</h2>
    <p style="color:#888; margin-bottom:24px;">닉네임을 입력하면 도감이 자동 저장돼요!</p>
    <input type="text" id="nicknameInput" placeholder="닉네임 입력 (예: 철수)" maxlength="20">
    <input type="password" id="passwordInput" placeholder="비밀번호 입력" maxlength="30">
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" onclick="startGame()">🎲 시작하기</button>
</div>

<!-- ===== 메인 게임 화면 ===== -->
<div id="gameScreen">

    <!-- 유저 정보 바 -->
    <div class="user-bar">
        <span id="userLabel">👤 닉네임</span>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>

    <div class="container">
        <h2>🎰 야짤을 얻기위해하는 가챠</h2>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <p style="margin:0; font-weight:bold; color:#007bff;">📁 이곳을 클릭해 사진들을 한꺼번에 넣으세요</p>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="storeImages(event)">
            <p class="count-text" id="countDisplay">현재 등록된 이미지: 계산 중...</p>
        </div>

        <button class="btn-draw" id="drawBtn" onclick="pickMyImage()">🎲 무작위 이미지 뽑기</button>

        <div style="margin-top:15px; background:#fff5f5; border-radius:12px; padding:12px; font-weight:bold; color:#ff4757; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
            🔥 확률 3배 보너스까지 <span id="boostCounter">10회 남음</span>
        </div>

        <div class="result-box" id="resultDisplay">
            <p style="color:#aaa;">버튼을 눌러 이미지를 뽑아보세요!</p>
        </div>
    </div>

    <!-- 도감 -->
    <div class="illustrated-guide">
        <div class="guide-title">
            <span>Collected 도감 목록</span>
            <button class="btn-reset" onclick="resetCollection()">🗑️ 도감 초기화</button>
        </div>
        <div id="guideCount" style="color:#ff4757; font-size:14px; margin-bottom:8px;">인생 망치는 도감 진행도: 0% (0/0종)</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="guide-grid" id="guideGrid">
            <p class="empty-text">아직 수집된 이미지가 없습니다.</p>
        </div>
        <div class="save-status" id="saveStatus"></div>
    </div>

</div>

];

// ========== 상태 변수 ==========
let currentUser = null;
let collectionPool = [];
let drawCount = 0;
let isDrawing = false;

// ========== 로그인 / 로그아웃 ==========
window.startGame = async function() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorEl = document.getElementById('loginError');
    errorEl.innerText = '';

    if (!nickname) { errorEl.innerText = '닉네임을 입력해주세요!'; return; }
    if (!password)  { errorEl.innerText = '비밀번호를 입력해주세요!'; return; }

    // Firebase에서 기존 유저 확인
    try {
        const docRef = doc(db, "users", nickname);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            // 기존 유저 → 비밀번호 일치 확인
            const savedPassword = docSnap.data().password;
            if (savedPassword !== password) {
                errorEl.innerText = '❌ 비밀번호가 틀렸어요!';
                return;
            }
        } else {
            // 신규 유저 → 비밀번호 저장
            await setDoc(docRef, { password, collection: [], drawCount: 0, updatedAt: new Date().toISOString() });
        }
    } catch (e) {
        errorEl.innerText = '❌ 서버 연결 실패. 잠시 후 다시 시도해주세요.';
        return;
    }

    currentUser = nickname;
    document.getElementById('userLabel').innerText = `👤 ${nickname}`;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    await loadUserData();
    updateUI();
};

window.logout = function() {
    currentUser = null;
    collectionPool = [];
    drawCount = 0;
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('nicknameInput').value = '';
};

// ========== Firebase: 불러오기 ==========
async function loadUserData() {
    try {
        const docRef = doc(db, "users", currentUser);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            collectionPool = data.collection || [];
            drawCount = data.drawCount || 0;
        } else {
            collectionPool = [];
            drawCount = 0;
        }
        refreshProgress();
    } catch (e) {
        console.error("불러오기 실패:", e);
    }
}

// ========== Firebase: 저장 ==========
async function saveUserData() {
    if (!currentUser) return;
    const statusEl = document.getElementById('saveStatus');
    statusEl.className = 'save-status saving';
    statusEl.innerText = '💾 저장 중...';
    try {
        const docRef = doc(db, "users", currentUser);
        await setDoc(docRef, {
            collection: collectionPool,
            drawCount: drawCount,
            updatedAt: new Date().toISOString()
        });
        statusEl.className = 'save-status saved';
        statusEl.innerText = '✅ 저장 완료!';
        setTimeout(() => { statusEl.innerText = ''; }, 2000);
    } catch (e) {
        statusEl.className = 'save-status error';
        statusEl.innerText = '❌ 저장 실패. 인터넷 연결을 확인하세요.';
    }
}

// ========== 도감 초기화 ==========
window.resetCollection = async function() {
    if (!confirm(`${currentUser}님의 도감을 초기화할까요? 이 작업은 되돌릴 수 없어요!`)) return;
    collectionPool = [];
    drawCount = 0;
    await saveUserData();
    refreshProgress();
    updateUI();
    document.getElementById('resultDisplay').innerHTML = '<p style="color:#aaa;">버튼을 눌러 이미지를 뽑아보세요!</p>';
    document.getElementById('resultDisplay').className = 'result-box';
};

// ========== UI 업데이트 ==========
function updateUI() {
    const remain = 10 - (drawCount % 10 || 10);
    document.getElementById('countDisplay').innerText =
        `현재 등록된 이미지: ${myImagePool.length}장 | 총 뽑기 횟수: ${drawCount}회`;
    document.getElementById('boostCounter').innerText =
        remain === 0 ? "지금 확률 3배!" : `${remain}회 남음`;
    document.getElementById('drawBtn').disabled = myImagePool.length === 0;
}

// ========== 이미지 업로드 ==========
window.storeImages = function(event) {
    const files = event.target.files;
    if (!files.length) return;
    const keys = Object.keys(GRADE_RULES);
    const totalWeight = keys.reduce((sum, key) => sum + GRADE_RULES[key].weight, 0);
    for (let i = 0; i < files.length; i++) {
        const url = URL.createObjectURL(files[i]);
        let randomNum = Math.random() * totalWeight;
        let selectedGrade = "common";
        for (let key of keys) {
            if (randomNum < GRADE_RULES[key].weight) { selectedGrade = key; break; }
            randomNum -= GRADE_RULES[key].weight;
        }
        myImagePool.push({ url, grade: selectedGrade });
    }
    updateUI();
    event.target.value = "";
};

// ========== 뽑기 ==========
window.pickMyImage = async function() {
    const btn = document.getElementById('drawBtn');
    if (btn.disabled || isDrawing || myImagePool.length === 0) return;
    isDrawing = true;
    btn.disabled = true;

    drawCount++;
    const boosted = (drawCount % 10 === 0);

    const totalWeight = myImagePool.reduce((sum, item) => {
        let w = GRADE_RULES[item.grade].weight;
        if (boosted && ["mythic","legend","epic"].includes(item.grade)) w *= 3;
        return sum + w;
    }, 0);

    let randomNum = Math.random() * totalWeight;
    let targetItem = null;
    for (const item of myImagePool) {
        let w = GRADE_RULES[item.grade].weight;
        if (boosted && ["mythic","legend","epic"].includes(item.grade)) w *= 3;
        if (randomNum < w) { targetItem = item; break; }
        randomNum -= w;
    }
    if (!targetItem) targetItem = myImagePool[0];

    const gradeInfo = GRADE_RULES[targetItem.grade];

    // 도감 중복 방지
    if (!collectionPool.some(item => item.url === targetItem.url)) {
        collectionPool.push({ url: targetItem.url, grade: targetItem.grade });
    }

    // 결과 출력
    const resultDisplay = document.getElementById('resultDisplay');
    resultDisplay.className = "result-box " + gradeInfo.class;
    resultDisplay.innerHTML = `
        <span class="grade-badge ${gradeInfo.bgClass}">${gradeInfo.name}</span>
        <img src="${targetItem.url}" alt="뽑기 결과">
        ${boosted ? `<div style="position:absolute;bottom:10px;background:#ff4757;color:white;padding:8px 16px;border-radius:20px;font-weight:bold;box-shadow:0 0 20px rgba(255,0,0,0.6);">🔥 신화 / 레전드 / 에픽 확률 3배 발동!</div>` : ""}
    `;

    refreshProgress();
    updateUI();
    await saveUserData();

    setTimeout(() => { isDrawing = false; btn.disabled = false; }, 1000);
};

// ========== 도감 렌더링 ==========
function refreshProgress() {
    const total = myImagePool.length;
    const collected = collectionPool.length;
    const percentage = total > 0 ? Math.round((collected / total) * 100) : 0;
    document.getElementById('guideCount').innerText = `인생 망치는 도감 진행도: ${percentage}% (${collected}/${total}종)`;
    document.getElementById('progressBar').style.width = percentage + "%";
    const grid = document.getElementById('guideGrid');
    if (collected === 0) {
        grid.innerHTML = `<p class="empty-text">아직 수집된 이미지가 없습니다.</p>`;
        return;
    }
    grid.innerHTML = collectionPool.map(item => `
        <div class="guide-item ${GRADE_RULES[item.grade].class}" style="border-width:2px !important; animation:none;">
            <img src="${item.url}">
        </div>
    `).join('');
}

// Enter키로 로그인
document.getElementById('nicknameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('passwordInput').focus();
});
document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.startGame();
});

</script>
