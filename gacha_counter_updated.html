<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내가 넣은 이미지 뽑기 & 초고급 레어도 시스템</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 이미지 등록 구역 */
        .upload-box { border: 2px dashed #007bff; padding: 20px; background: #f0f7ff; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .count-text { font-size: 14px; color: #555; margin-top: 5px; }
        
        /* 버튼 스타일 */
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-draw { background: #ff4757; color: white; margin-top: 10px; }
        .btn-draw:hover { background: #ff6b81; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; }
        
        /* 결과 화면 상자 */
        .result-box { width: 100%; height: 600px; border: 2px solid #ddd; margin-top: 25px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; overflow: hidden; box-sizing: border-box; position: relative; }
        
        /* 등급 텍스트 뱃지 스타일 */
        .grade-badge { position: absolute; top: 15px; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; color: white; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 🌈 [핵심] 6단계 레어도별 테두리 및 뱃지 스타일 */
        /* 1. 일반 (회색) */
        .rarity-common { border: 6px solid #bdc3c7 !important; }
        .bg-common { background: #bdc3c7; }
        
        /* 2. 희귀 (초록색) */
        .rarity-uncommon { border: 6px solid #2ecc71 !important; }
        .bg-uncommon { background: #2ecc71; }
        
        /* 3. 레어 (하늘색) */
        .rarity-rare { border: 6px solid #5bc0de !important; box-shadow: inset 0 0 15px rgba(91, 192, 222, 0.5); }
        .bg-rare { background: #5bc0de; }
        
        /* 4. 에픽 (보라색) */
        .rarity-epic { border: 6px solid #9b59b6 !important; box-shadow: inset 0 0 20px rgba(155, 89, 182, 0.6); }
        .bg-epic { background: #9b59b6; }
        
        /* 5. 레전드 (노란색 + 발광 애니메이션) */
        .rarity-legend { border: 6px solid #f1c40f !important; box-shadow: inset 0 0 25px rgba(241, 196, 15, 0.8); animation: pulse-gold 1.5s infinite alternate; }
        .bg-legend { background: #f1c40f; color: #333 !important; }
        
        /* 6. 신화 (빨간색 + 강렬한 불꽃 애니메이션) */
        .rarity-mythic { border: 6px solid #e74c3c !important; box-shadow: inset 0 0 30px rgba(231, 76, 60, 0.9); animation: pulse-red 1.2s infinite alternate; }
        .bg-mythic { background: #e74c3c; animation: shake 0.5s infinite; }

        .result-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            box-sizing: border-box;
            animation: pop 0.3s ease-out; 
        }

        /* 📜 도감 시스템 스타일 */
        .illustrated-guide { max-width: 500px; margin: 30px auto 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        .guide-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
        
        /* 📊 진척도 게이지 바 스타일 */
        .progress-container { background: #eee; border-radius: 10px; height: 12px; width: 100%; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ff4757, #ff6b81); height: 100%; width: 0%; transition: width 0.3s ease; }
        
        .guide-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; min-height: 80px; }
        .guide-item { width: 100%; aspect-ratio: 1 / 1; border: 1px dashed #ccc; border-radius: 6px; overflow: hidden; background: #fafafa; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .guide-item img { width: 100%; height: 100%; object-fit: cover; box-sizing: border-box; }
        .empty-text { grid-column: span 4; text-align: center; color: #aaa; line-height: 80px; margin: 0; font-size: 14px; }

        /* ✨ 특수 효과 애니메이션 */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse-gold {
            0% { box-shadow: inset 0 0 10px rgba(241, 196, 15, 0.4), 0 0 10px rgba(241, 196, 15, 0.2); }
            100% { box-shadow: inset 0 0 25px rgba(241, 196, 15, 0.9), 0 0 20px rgba(241, 196, 15, 0.6); }
        }
        @keyframes pulse-red {
            0% { box-shadow: inset 0 0 15px rgba(231, 76, 60, 0.5), 0 0 15px rgba(231, 76, 60, 0.3); border-color: #e74c3c !important; }
            100% { box-shadow: inset 0 0 35px rgba(231, 76, 60, 1), 0 0 30px rgba(231, 76, 60, 0.8); border-color: #ff3f34 !important; }
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 야짤을 얻기위해하는 가챠</h2>
    
    <!-- 파일 여러 개 넣는 업로드 구역 -->
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p style="margin:0; font-weight:bold; color:#007bff;">📁 이곳을 클릭해 사진들을 한꺼번에 넣으세요</p>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="storeImages(event)">
        <p class="count-text" id="countDisplay">현재 등록된 이미지: 계산 중...</p>
    </div>

    <!-- 뽑기 버튼 -->
    
<button class="btn-draw" id="drawBtn" onclick="pickMyImage()">🎲 무작위 이미지 뽑기</button>

<div style="
    margin-top:15px;
    background:#fff5f5;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    color:#ff4757;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
">
    🔥 확률 3배 보너스까지
    <span id="boostCounter">10회 남음</span>
</div>


    <!-- 뽑힌 결과 상자 -->
    <div class="result-box" id="resultDisplay">
        <p style="color:#aaa;">버튼을 눌러 이미지를 뽑아보세요!</p>
    </div>
</div>

<!-- 📜 뽑은 이미지 도감 구역 -->
<div class="illustrated-guide">
    <div class="guide-title">
        <span>Collected 도감 목록</span>
        <span id="guideCount" style="color: #ff4757; font-size: 16px;">인생 망치는 도감 진행도: 0% (0/0종)</span>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="guide-grid" id="guideGrid">
        <p class="empty-text">아직 수집된 이미지가 없습니다.</p>
    </div>
</div>

<script>
// 각 등급 정보와 확률(가중치) 매핑 데이터 구조
const GRADE_RULES = {
	secret:  { name: "🌌 비밀",    class: "rarity-secret",  bgClass: "bg-secret",  weight: 0.00000001 },
    mythic:  { name: "👑 신화",    class: "rarity-mythic",  bgClass: "bg-mythic",  weight: 0.1 },
    legend:  { name: "🌟 레전드",  class: "rarity-legend",  bgClass: "bg-legend",  weight: 1 },
    epic:    { name: "🔮 에픽",    class: "rarity-epic",    bgClass: "bg-epic",    weight: 5 },
    rare:    { name: "🔹 레어",    class: "rarity-rare",    bgClass: "bg-rare",    weight: 16 },
    uncommon:{ name: "🌿 희귀",    class: "rarity-uncommon",bgClass: "bg-uncommon",weight: 30 },
    common:  { name: "⚙️ 일반",    class: "rarity-common",  bgClass: "bg-common",  weight: 45 }
};

// 기본 이미지 배열에 지정해주신 등급(확률 비율) 부여
let myImagePool = [
    { url: "https://i.namu.wiki/i/bGnYOczdEsPkDk3HMfzJJwoPl1NPzDPDpyshQuiT9gA_DrvlvF5rpAc1lJ6CRdbro-xreQFginzvV2_cXunWrA.webp", grade: "common"},
	{ url: "https://pbs.twimg.com/media/HImtL3Pb0AAbTxs.jpg:large", grade: "common"},
	{ url: "https://i.namu.wiki/i/bGnYOczdEsPkDk3HMfzJJwoPl1NPzDPDpyshQuiT9gA_DrvlvF5rpAc1lJ6CRdbro-xreQFginzvV2_cXunWrA.webp", grade: "common"},
	{ url: "https://pbs.twimg.com/media/HImhTHFagAA4Kza.jpg:large", grade: "common"},
	{ url: "https://pbs.twimg.com/media/HIkQybgbgAEDJ-L.jpg:large", grade: "common"},
	{ url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTO4_HAEzJO-5GjbKGg9Gu32ovLEwwvjHSJGQ&s", grade: "common"},
	{ url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTO4_HAEzJO-5GjbKGg9Gu32ovLEwwvjHSJGQ&s", grade: "common"},
	{ url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQ1KsngstYdFpS8xAUYhlkh6k8GUsonrQEtA&s", grade: "uncommon"},
	{ url: "https://pbs.twimg.com/media/HIkJBXQW0AA53Od.jpg:large", grade: "uncommon"},
	{ url: "https://pbs.twimg.com/media/HIkzCFPbUAI4rQb.jpg:large", grade: "uncommon"},
	{ url: "https://jf.x.com/images/media-preview/2056378429961056602", grade: "uncommon"},
	{ url: "https://pbs.twimg.com/media/HIoaTN4bwAApxxq.jpg:large", grade: "uncommon"},
	{ url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9xpBboXERvVR4qYE-6gX9FjhSiFGyftjPog&s", grade: "uncommon"},
	{ url: "https://pbs.twimg.com/media/HImmoBjbQAA08EJ.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HImj4_wb0AAMnwO.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HImm-3IbQAA3MZ7.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HIg0X-NbwAA80V5.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HImgE7ObgAAtQst.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HIn5AyubYAE6OC_.jpg:large", grade: "rare"},
	{ url: "https://pbs.twimg.com/media/HIgxO7BW8AA7en2.jpg:large", grade: "rare"},
    { url: "https://avatars.mds.yandex.net/i?id=94f92724f5046813d0952eeaf21390ffb13914c1-5225268-images-thumbs&n=13", grade: "epic"},
	{ url: "https://pbs.twimg.com/media/HInS-qCbgAA6sLq.jpg:large", grade: "epic"},
	{ url: "https://pbs.twimg.com/media/HIQ0bF_aMAAp3f1.jpg:large", grade: "epic"},
	{ url: "https://media.bunjang.co.kr/product/395547531_3_1773659179_w360.jpg", grade: "epic"},
	{ url: "https://pbs.twimg.com/media/HInf1gWa0AA1TEo.jpg:large", grade: "legend"},
	{ url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504773006210240563/SPOILER_i.png?ex=6a0d7a92&is=6a0c2912&hm=7027a4b201b17cad1a427e95e421d570f491bbd7abc9e9e5a935c110f0b2c63c&", grade: "legend"},
	{ url: "https://cdn.discordapp.com/attachments/1444326900578255030/1506161009747038312/SPOILER_fe901f2d1f6489ae65585bd3a03bee4c.png?ex=6a0d413f&is=6a0befbf&hm=3e7440f8d528b6daff7793a4377a9f06808b0f0af08f3cf0d678bd57230c5b56&", grade: "legend"},
	{ url: "https://cdn.discordapp.com/attachments/1444326900578255030/1506160659748884520/SPOILER_99afccf7acd2e2780e300c212e4e67c9.png?ex=6a0d40ec&is=6a0bef6c&hm=0ebfd331b66b6cc0e72027a784e9a47166dee45b8f776919564dcf7a597e131a&", grade: "legend"},
	{ url: "https://cdn.discordapp.com/attachments/1413934861743558726/1505954447342174328/2025-09-05_000252.png?ex=6a0c80df&is=6a0b2f5f&hm=d940abf8b4914e30020b4fb6acd864a9a7bda770129e35f853ff8f53e4f593ed&", grade: "mythic"},
	{ url: "https://pbs.twimg.com/media/HIl8-tEbIAEaZlG.jpg:large", grade: "mythic"},
	{ url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504772143832105071/SPOILER_i.png?ex=6a0d79c4&is=6a0c2844&hm=5943ec41ee04fb2f77c56b63d18b8128c034e26f848b86a132003094012768cd&", grade: "mythic"},
	{ url: "https://cdn.discordapp.com/attachments/1445707376861905018/1504773725923315845/SPOILER_i.png?ex=6a0d7b3d&is=6a0c29bd&hm=6f66b2c12611802601982b5c9cc59320dbda817f5446dc7b17c4c2f203d714af&", grade: "mythic"},
	{ url: "https://cdn.discordapp.com/attachments/1506220395391619145/1506220425527693392/KakaoTalk_20260519_175806047.jpg?ex=6a0d7895&is=6a0c2715&hm=352e73ef6bf8a3db1d9c1925f124cf59d24c805d8f41e8d3650f004bd6ba5c7b&", grade: "secret"},
];

let collectionPool = [];

// ⭐ 총 뽑기 횟수
let drawCount = 0;

function updateUI() {

    const remain = 10 - (drawCount % 10 || 10);

    document.getElementById('countDisplay').innerText =
        `현재 등록된 이미지: ${myImagePool.length}장 | 총 뽑기 횟수: ${drawCount}회`;

    document.getElementById('boostCounter').innerText =
        remain === 0
        ? "지금 확률 3배!"
        : `${remain}회 남음`;

    document.getElementById('drawBtn').disabled =
        myImagePool.length === 0;

    refreshProgress();
}

// 사용자가 임의로 추가하는 커스텀 이미지는 등급을 가중치 확률에 맞추어 임의 분배하도록 설정
function storeImages(event) {
    const files = event.target.files;
    if (!files.length) return;

    // 가중치 기반으로 등급을 하나 무작위 선택하는 로직
    const keys = Object.keys(GRADE_RULES);
    const totalWeight = keys.reduce((sum, key) => sum + GRADE_RULES[key].weight, 0);

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const url = URL.createObjectURL(file);

        // 확률 계산
        let randomNum = Math.random() * totalWeight;
        let selectedGrade = "common";

        for (let key of keys) {
            if (randomNum < GRADE_RULES[key].weight) {
                selectedGrade = key;
                break;
            }
            randomNum -= GRADE_RULES[key].weight;
        }

        myImagePool.push({ url: url, grade: selectedGrade });
    }

    updateUI();
    event.target.value = ""; // 재업로드 가능하도록 초기화
}

// 🎲 무작위 이미지 뽑기 함수 (연타 방지 포함)
// 🎲 가중치 기반 무작위 이미지 뽑기 함수
// 🔒 전역 또는 상위 스코프에 연타 방지 변수 선언 (함수 밖에 위치해야 합니다)
let isDrawing = false; 

function pickMyImage() {

    const btn = document.getElementById('drawBtn');

    // 🛑 [수정] 버튼이 막혀있거나, 이미 뽑기 진행 중이거나, 풀이 비어있으면 실행 차단
    if (btn.disabled || isDrawing || myImagePool.length === 0) return;

    // 🔒 연타 방지 활성화 (상태 변경 및 버튼 비활성화)
    isDrawing = true;
    btn.disabled = true;

    // ⭐ 총 뽑기 증가
    drawCount++;

    // ⭐ 10회마다 확률 3배
    const boosted = (drawCount % 10 === 0);

    // 📊 전체 가중치 계산
    const totalWeight = myImagePool.reduce((sum, item) => {
        let weight = GRADE_RULES[item.grade].weight;
        if (boosted && (item.grade === "mythic" || item.grade === "legend" || item.grade === "epic")) {
            weight *= 3;
        }
        return sum + weight;
    }, 0);

    // 🎲 랜덤 값 생성
    let randomNum = Math.random() * totalWeight;

    // 🎯 가중치 기반 선택
    let targetItem = null;
    for (const item of myImagePool) {
        let weight = GRADE_RULES[item.grade].weight;
        if (boosted && (item.grade === "mythic" || item.grade === "legend" || item.grade === "epic")) {
            weight *= 3;
        }
        if (randomNum < weight) {
            targetItem = item;
            break;
        }
        randomNum -= weight;
    }

    // 안전장치
    if (!targetItem) {
        targetItem = myImagePool[0];
    }

    const gradeInfo = GRADE_RULES[targetItem.grade];

    // 📜 도감 중복 방지
    if (!collectionPool.some(item => item.url === targetItem.url)) {
        collectionPool.push(targetItem);
    }

    // 🖼️ 결과 출력
    const resultDisplay = document.getElementById('resultDisplay');
    resultDisplay.className = "result-box " + gradeInfo.class;

    resultDisplay.innerHTML = `
        <span class="grade-badge ${gradeInfo.bgClass}">
            ${gradeInfo.name}
        </span>
        <img src="${targetItem.url}" alt="뽑기 결과">
        ${boosted ? `
            <div style="position:absolute; bottom:10px; background:#ff4757; color:white; padding:8px 16px; border-radius:20px; font-weight:bold; box-shadow:0 0 20px rgba(255,0,0,0.6);">
                🔥 신화 / 레전드 / 에픽 확률 3배 발동!
            </div>
        ` : ""}
    `;

    // 📊 UI 갱신
    refreshProgress();
    updateUI();

    // ⏳ 1초 후 연타 방지 해제 및 버튼 재활성화
    setTimeout(() => {
        isDrawing = false; // 🔓 다시 뽑기 가능 상태로 변경
        btn.disabled = false;
    }, 1000);
}



// 📊 도감 목록 및 진척도 게이지 새로고침 함수
function refreshProgress() {
    const total = myImagePool.length;
    const collected = collectionPool.length;
    const percentage = total > 0 ? Math.round((collected / total) * 100) : 0;

    // 상단 텍스트 및 프로그레스 바 수정
    document.getElementById('guideCount').innerText = `인생 망치는 도감 진행도: ${percentage}% (${collected}/${total}종)`;
    document.getElementById('progressBar').style.width = percentage + "%";

    // 그리드 영역 출력
    const grid = document.getElementById('guideGrid');
    if (collected === 0) {
        grid.innerHTML = `<p class="empty-text">아직 수집된 이미지가 없습니다.</p>`;
        return;
    }

    // 도감 아이템들 생성해서 격자에 채우기
    grid.innerHTML = collectionPool.map(item => {
        const borderClass = GRADE_RULES[item.grade].class;
        return `
            <div class="guide-item ${borderClass}" style="border-width: 2px !important; animation: none;">
                <img src="${item.url}">
            </div>
        `;
    }).join('');
}

// 초기화 호출
updateUI();
</script>

</body>
</html>
